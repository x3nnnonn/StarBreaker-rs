name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          shared-key: cache-${{ matrix.platform }}
          cache-on-failure: true
          save-if: false

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build CLI
        run: cargo build --release --package starbreaker

      - name: Upload CLI (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: cli-windows
          path: target/release/starbreaker.exe

      - name: Upload CLI (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: cli-linux
          path: target/release/starbreaker

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: "StarBreaker ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  upload-cli:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cli-windows
          path: cli-windows
      - uses: actions/download-artifact@v4
        with:
          name: cli-linux
          path: cli-linux

      - name: Package CLI artifacts
        run: |
          tag="${{ github.ref_name }}"
          zip -j "starbreaker-cli-${tag}-windows-x86_64.zip" cli-windows/starbreaker.exe
          tar -czf "starbreaker-cli-${tag}-linux-x86_64.tar.gz" -C cli-linux starbreaker

      - name: Upload CLI to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            starbreaker-cli-${{ github.ref_name }}-windows-x86_64.zip
            starbreaker-cli-${{ github.ref_name }}-linux-x86_64.tar.gz
